# docker-compose.monitoring.yml
#
# Networks are declared HERE because this is the first included file.
# docker-compose.yml references them but does not redeclare them.
#
# otel-collector: app_network + monitoring_network
#   app_network        — game-server and traefik push telemetry here
#   monitoring_network — fans out to tempo, loki, prometheus
#
# grafana: app_network + monitoring_network
#   app_network        — Traefik proxies grafana.localhost here
#   monitoring_network — reads from tempo, loki, prometheus
#
# traefik: app_network + monitoring_network (declared in docker-compose.yml)
#   monitoring_network — sends its own traces to otel-collector
#
# Everything else: monitoring_network only.

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    profiles: [monitoring]
    command: ["--config", "/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/collector-config.yaml:/etc/otelcol/config.yaml
    networks:
      - app_network
      - monitoring_network
    depends_on:
      - tempo
      - loki
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Exposes /otlp/* so the frontend can push traces from the browser.
      # The collector's HTTP receiver listens on port 4318.
      # Priority 200 — higher than all services so it never gets caught
      # by the game-server catchall.
      - "traefik.http.routers.otel-collector.rule=PathPrefix(`/otlp`)"
      - "traefik.http.routers.otel-collector.entrypoints=web"
      - "traefik.http.routers.otel-collector.priority=200"
      - "traefik.http.routers.otel-collector.middlewares=otel-strip,security-headers@file"
      - "traefik.http.middlewares.otel-strip.stripprefix.prefixes=/otlp"
      - "traefik.http.routers.otel-collector.service=otel-collector-svc"
      - "traefik.http.services.otel-collector-svc.loadbalancer.server.port=4318"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    profiles: [monitoring]
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./infra/tempo-config.yaml:/etc/tempo/config.yaml
      - tempo-data:/var/tempo
    networks:
      - monitoring_network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    profiles: [monitoring]
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/loki-config.yaml:/etc/loki/config.yaml
      - loki-data:/loki
    networks:
      - monitoring_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: [monitoring]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./infra/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - monitoring_network
      - app_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: [monitoring]
    environment:
      - GF_SERVER_ROOT_URL=http://grafana.localhost/
      # No login locally — open access as Admin for convenience.
      # In production, put Grafana behind Cloudflare Access (or similar)
      # and override these with stricter values.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./infra/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring_network
      - app_network
    depends_on:
      - tempo
      - loki
      - prometheus
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      # Grafana is excluded from security-headers — it requires 'unsafe-eval'
      # for table panels and transformations, and manages its own CSP.
      - "traefik.http.routers.grafana.service=grafana-svc"
      - "traefik.http.services.grafana-svc.loadbalancer.server.port=3000"

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:

# Networks declared here — first included file owns the network definitions.
# All other compose files reference these networks without redeclaring them.
networks:
  app_network:
    external: true
  data_network:
    external: true
  monitoring_network:
    external: true
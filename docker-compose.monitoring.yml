services:
  # OpenTelemetry Collector - central telemetry router
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config", "/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/collector-config.yaml:/etc/otelcol/config.yaml
    networks:
      - monitoring_network
      - app_network
    depends_on:
      - tempo
      - loki

  # Grafana Tempo - distributed tracing backend
  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./infra/tempo-config.yaml:/etc/tempo/config.yaml
      - tempo-data:/var/tempo
    networks:
      - monitoring_network

  # Grafana Loki - log aggregation backend
  loki:
    image: grafana/loki:latest
    container_name: loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/loki-config.yaml:/etc/loki/config.yaml
      - loki-data:/loki
    networks:
      - monitoring_network

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    user: root
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/promtail-config.yaml:/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - monitoring_network
      - app_network
    restart: unless-stopped

  # Prometheus - metrics storage and query
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./infra/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - monitoring_network
      - app_network

  # Grafana - visualization and dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true 
    volumes:
      - ./infra/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring_network
      - app_network
    depends_on:
      - tempo
      - loki
      - prometheus

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:

networks:
  monitoring_network:   # grafana, prometheus, tempo, loki, otel-collector
    name: monitoring_network
    driver: bridge
  data_network:         # game-server, postgres, redis
    name: data_network
    driver: bridge
  app_network:          # caddy, frontend, game-server
    name: app_network
    driver: bridge
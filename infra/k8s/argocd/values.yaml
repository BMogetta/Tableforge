# ArgoCD Helm values — Recess homelab (single-node k3s on Raspberry Pi 5).
# Chart: argo/argo-cd 9.5.2 (app v3.3.7)
#
# Strategy for this phase (5.3):
#   - Single replica per component (no HA).
#   - TLS disabled on the server; access via `kubectl port-forward` until cloudflared lands in Phase 5.8.
#   - Optional components (dex, notifications) disabled to save memory.
#   - Conservative resource requests/limits tuned for Pi 5 (16GB).

configs:
  params:
    # Accept plain HTTP. Traefik/cloudflared will terminate TLS later.
    server.insecure: true

# Force single-instance Redis (no HA).
redis-ha:
  enabled: false

# Application reconciliation controller — heaviest component.
controller:
  replicas: 1
  # Bumped defaults (op=10, status=20) to reduce serial-queue tail on
  # ~22 Applications. Reconciles faster when multiple apps queue at once.
  extraArgs:
    - --operation-processors=30
    - --status-processors=50
    - --self-heal-timeout-seconds=2
  resources:
    requests:
      cpu: 150m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 768Mi

# API + web UI.
server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Ingress is off for now; port-forward for access. Phase 5.8 will flip this on.
  ingress:
    enabled: false

# Git / manifest renderer. Memory bumped 512Mi → 2Gi after the first
# rendering of the bitnami/redis Helm chart OOMKilled the pod twice at
# 512Mi and 1Gi — large umbrella charts (bitnami/redis, kube-prometheus-stack)
# spike memory heavily during template expansion. The Pi 5 has 16Gi,
# burning 2Gi on the repo-server is cheap.
repoServer:
  replicas: 1
  # --parallelism-limit was removed from argocd-repo-server in v3.x (the
  # daemon accepts it but the flag prints help and exits — CrashLoopBackOff
  # until the extraArgs line is removed). Concurrent-render throughput is
  # controlled via ARGOCD_REPO_SERVER_PARALLELISM_LIMIT env var in newer
  # versions, but leave defaults for now; the main win comes from bumped
  # resources + controller workers, not render parallelism.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# ApplicationSet controller (needed for the App-of-Apps root in 5.3.d).
applicationSet:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

# In-cluster cache.
redis:
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# No OIDC yet — admin password auth is fine for this phase.
dex:
  enabled: false

# No Slack/email/Discord hooks yet.
notifications:
  enabled: false

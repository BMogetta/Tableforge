# sealed-secrets controller — Recess homelab.
# Chart: sealed-secrets/sealed-secrets 2.18.5 (app 0.36.6)
#
# The controller lives in `kube-system` (same convention as the plan and
# as bitnami's own default). Sized conservatively — the controller just
# watches SealedSecret CRs, decrypts them into plain Secrets, and then
# does nothing. Idle RSS is ~20-30Mi.

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Prometheus ServiceMonitor lands in Phase 6.
metrics:
  serviceMonitor:
    enabled: false

# CloudNativePG PostgreSQL cluster — Recess primary database.
#
# Single instance (homelab single-node); CNPG still creates -rw/-ro/-r
# services and an HA-ready configuration we can scale later by bumping
# `spec.instances`.
#
# Schemas created at initdb time:
#   - `public`  — owned by the application user (rooms, sessions, moves, etc.)
#   - `users`   — profile domain (user-service)
#   - `ratings` — MMR / ELO data (rating-service)
#
# Credentials: CNPG auto-generates Secrets
#   - `pg-app`         — application user (recess / recess@<random>)
#   - `pg-superuser`   — postgres superuser
# These live in `recess-data` namespace. Phase 5.9 migrates them to
# SealedSecrets; Phase 5.4 services reference the `pg-app` Secret via
# valueFrom envs.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: recess-data
  labels:
    app.kubernetes.io/part-of: recess
spec:
  instances: 1

  # Pin to PostgreSQL 16 on CNPG's official image stream.
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6

  bootstrap:
    initdb:
      database: recess
      owner: recess
      # Run after the DB is up and the owner role exists. Creates the two
      # non-default schemas and grants the app user full access.
      postInitApplicationSQL:
        - CREATE SCHEMA IF NOT EXISTS users AUTHORIZATION recess
        - CREATE SCHEMA IF NOT EXISTS ratings AUTHORIZATION recess

  storage:
    storageClass: local-path
    size: 20Gi

  # Sized for Pi 5. Postgres idle hovers ~100Mi; headroom to 1Gi
  # accommodates connection surges and the shared buffers CNPG tunes
  # automatically based on limits.memory.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Prometheus scrape wiring lands in Phase 6.
  monitoring:
    enablePodMonitor: false

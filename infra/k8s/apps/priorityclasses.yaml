# Priority classes — cluster-scoped, synced independently of workloads.
# Must exist before any pod references them via priorityClassName; since
# this Application has no sync-wave and the root picks it up on the same
# cycle as the workloads, first-time deploys may schedule a few pods
# without the class before it lands. Self-heal fixes it on the next
# reconcile.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: priorityclasses
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: recess
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: recess
  source:
    repoURL: https://github.com/BMogetta/recess.git
    targetRevision: HEAD
    path: infra/k8s
    directory:
      recurse: false
      include: priorityclasses.yaml
  destination:
    server: https://kubernetes.default.svc
    # PriorityClass is cluster-scoped; namespace here is the default
    # ArgoCD uses for any resource without one (none apply here).
    namespace: kube-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

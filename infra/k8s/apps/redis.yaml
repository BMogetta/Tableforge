# Redis — single-instance for session state, pub/sub, rate limiting, Asynq
# task queue. Bitnami chart, standalone architecture (no sentinel, no
# cluster — homelab single-node).
#
# Values are inlined here because the configuration is small. When values
# outgrow this block, split into `infra/k8s/redis/values.yaml` and switch
# this Application to multi-source (one source = helm repo, another =
# git repo with the values file).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: recess
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: recess
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 25.3.11
    helm:
      releaseName: redis
      values: |
        architecture: standalone

        # Password is managed out-of-band as a SealedSecret in
        # infra/k8s/secrets/redis-auth.yaml (decrypts into Secret
        # `redis-auth` in this namespace). The chart reads from that
        # Secret instead of auto-generating a value, which makes the
        # cluster reproducible — a fresh install gets the same password
        # because the SealedSecret is deterministic against the
        # controller's cluster-specific key.
        auth:
          enabled: true
          existingSecret: redis-auth
          existingSecretPasswordKey: redis-password

        # Applied to every redis role (master/replica). The chart ships no
        # maxmemory limit by default, so LRU eviction never fires even with
        # resource limits. Match the homelab docker-compose behaviour.
        commonConfiguration: |-
          maxmemory 200mb
          maxmemory-policy allkeys-lru

        master:
          persistence:
            enabled: true
            size: 5Gi
            storageClass: local-path
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # Prometheus exporter lives in Phase 6.
        metrics:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: recess-data
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

# OpenTelemetry Collector — Phase 6.4.
# Single OTLP entrypoint for every service. Routes to Tempo + Loki + Prom.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: recess
  annotations:
    argocd.argoproj.io/sync-wave: "14"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: recess
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-collector
      targetRevision: 0.150.1
      helm:
        releaseName: otel-collector
        valueFiles:
          - $values/infra/k8s/observability/otel-collector/values.yaml
    - repoURL: https://github.com/BMogetta/recess.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

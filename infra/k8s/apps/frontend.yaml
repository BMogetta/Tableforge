# frontend (Nginx serving Vite bundle) — Phase 5.5 closeout.
# Shares the go-service Helm chart with the 8 Go services. Only difference
# is the empty env/envFromSecret and the /healthz endpoint added to
# frontend/nginx.conf.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: recess
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: recess
  source:
    repoURL: https://github.com/BMogetta/recess.git
    targetRevision: HEAD
    path: infra/k8s/charts/go-service
    helm:
      releaseName: frontend
      valueFiles:
        - values/frontend.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: recess
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

# Application CR that syncs every SealedSecret CR under infra/k8s/secrets/.
# The SealedSecret controller in kube-system decrypts each CR into a plain
# Secret in the namespace the CR declares. Every SealedSecret file is safe
# to commit — the payload is asymmetrically encrypted against the
# controller's cluster-specific public cert.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: recess
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: recess
  source:
    repoURL: https://github.com/BMogetta/recess.git
    targetRevision: main
    path: infra/k8s/secrets
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    # SealedSecret CRs carry their own metadata.namespace. ArgoCD uses
    # destination.namespace as a fallback only; it does not override the
    # CR's own namespace field.
    namespace: recess-data
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

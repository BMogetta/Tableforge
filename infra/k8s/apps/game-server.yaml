# game-server — Phase 5.5 rollout.
# Owns the default Postgres schema (rooms/sessions/events/notifications/chat)
# and exposes lobby + game gRPC on :9080 for match-service and ws-gateway.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: game-server
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: recess
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: recess
  source:
    repoURL: https://github.com/BMogetta/recess.git
    targetRevision: HEAD
    path: infra/k8s/charts/go-service
    helm:
      releaseName: game-server
      valueFiles:
        - values/game-server.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: recess
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

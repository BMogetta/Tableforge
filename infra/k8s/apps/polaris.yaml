# Polaris — GOVERNANCE_PLAN Phase A.1. Scans every manifest against ~30
# best-practice checks (security contexts, resource limits, PDBs, image
# pinning, etc.) and reports a cluster-wide score in its dashboard.
# Audit-only; no admission webhook until the baseline is clean.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: polaris
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: recess
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: recess
  sources:
    - repoURL: https://charts.fairwinds.com/stable
      chart: polaris
      targetRevision: 5.19.0
      helm:
        releaseName: polaris
        valueFiles:
          - $values/infra/k8s/observability/polaris/values.yaml
    - repoURL: https://github.com/BMogetta/recess.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

# rating-service — Phase 5.5 rollout.
# Exposes gRPC on :9085; match-service calls it for MMR lookup.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rating-service
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: recess
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: recess
  source:
    repoURL: https://github.com/BMogetta/recess.git
    targetRevision: HEAD
    path: infra/k8s/charts/go-service
    helm:
      releaseName: rating-service
      valueFiles:
        - values/rating-service.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: recess
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

# polaris.bmogetta.com. Read-only Polaris dashboard. Behind Cloudflare
# Access in the tunnel config (same as Grafana).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: polaris
  namespace: observability
  labels:
    app.kubernetes.io/part-of: recess
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`polaris.bmogetta.com`)
      services:
        - name: polaris-dashboard
          port: 80

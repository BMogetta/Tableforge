# grafana.bmogetta.com. Dashboard UI. Behind Cloudflare Access (recommended
# to configure in CF Zero Trust dashboard) or basic auth in a follow-up.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/part-of: recess
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`grafana.bmogetta.com`)
      services:
        - name: kube-prometheus-stack-grafana
          port: 80

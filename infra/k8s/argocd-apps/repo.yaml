# Registers this repository as a source that ArgoCD knows about.
# For a public repo no auth fields are needed; ArgoCD treats this as an
# anonymous HTTPS source. When the repo flips back to private, add
# `password` / `username` (or `sshPrivateKey`) to this Secret — ideally via
# SealedSecret once Phase 5.9 lands.
apiVersion: v1
kind: Secret
metadata:
  name: recess-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/BMogetta/recess.git

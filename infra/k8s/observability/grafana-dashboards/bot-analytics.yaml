# grafana-dashboard-bot-analytics — ConfigMap auto-imported by the
# kube-prometheus-stack Grafana sidecar because of the
# `grafana_dashboard: "1"` label. Content migrated verbatim from
# infra/grafana/provisioning/dashboards/bot-analytics.json.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-bot-analytics
  namespace: observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: recess
data:
  bot-analytics.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "MMR over time (per bot)",
          "type": "timeseries",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "postgres", "uid": "postgres" },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawQuery": true,
              "rawSql": "SELECT rh.created_at AS time, p.username AS metric, rh.mmr_after AS value FROM ratings.rating_history rh JOIN players p ON p.id = rh.player_id WHERE p.is_bot = true AND $__timeFilter(rh.created_at) ORDER BY rh.created_at"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "lineInterpolation": "stepAfter", "showPoints": "auto" },
              "unit": "none"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "showLegend": true },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 2,
          "title": "Bot performance summary",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 9 },
          "datasource": { "type": "postgres", "uid": "postgres" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT p.username AS bot, COUNT(gr.id) AS games, COUNT(*) FILTER (WHERE grp.outcome = 'win') AS wins, COUNT(*) FILTER (WHERE grp.outcome = 'loss') AS losses, COUNT(*) FILTER (WHERE grp.outcome = 'draw') AS draws, ROUND(100.0 * COUNT(*) FILTER (WHERE grp.outcome = 'win') / NULLIF(COUNT(*), 0), 1) AS win_rate, (SELECT mmr_after FROM ratings.rating_history rh2 WHERE rh2.player_id = p.id ORDER BY rh2.created_at DESC LIMIT 1) AS current_mmr FROM players p LEFT JOIN game_result_players grp ON grp.player_id = p.id LEFT JOIN game_results gr ON gr.id = grp.result_id WHERE p.is_bot = true GROUP BY p.id, p.username ORDER BY p.username"
            }
          ],
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "win_rate" },
                "properties": [{ "id": "unit", "value": "percent" }]
              }
            ]
          },
          "options": { "showHeader": true }
        },
        {
          "id": 3,
          "title": "Games played per day (per bot)",
          "type": "barchart",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 9 },
          "datasource": { "type": "postgres", "uid": "postgres" },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawQuery": true,
              "rawSql": "SELECT DATE_TRUNC('day', gr.created_at) AS time, p.username AS metric, COUNT(gr.id) AS value FROM game_results gr JOIN game_result_players grp ON grp.result_id = gr.id JOIN players p ON p.id = grp.player_id WHERE p.is_bot = true AND $__timeFilter(gr.created_at) GROUP BY 1, 2 ORDER BY 1"
            }
          ],
          "fieldConfig": {
            "defaults": { "custom": { "fillOpacity": 80, "stacking": { "mode": "normal" } } },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 4,
          "title": "Average game duration (seconds)",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 17 },
          "datasource": { "type": "postgres", "uid": "postgres" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT p.username AS bot, ROUND(AVG(gr.duration_secs)::numeric, 1) AS avg_duration_secs FROM game_results gr JOIN game_result_players grp ON grp.result_id = gr.id JOIN players p ON p.id = grp.player_id WHERE p.is_bot = true AND gr.duration_secs IS NOT NULL GROUP BY p.id, p.username ORDER BY p.username"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s", "color": { "mode": "continuous-GrYlRd" } },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["bots", "ranked"],
      "templating": { "list": [] },
      "time": { "from": "now-7d", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Bot Analytics",
      "uid": "bot-analytics",
      "version": 1,
      "weekStart": ""
    }

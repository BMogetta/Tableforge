# frontend overrides for the go-service chart.
# The chart is named `go-service` but the deployment template only assumes
# "container with an HTTP port and optional gRPC port". Works fine for the
# Nginx-served Vite bundle too. The only thing that felt off was the default
# `/healthz` probe path — nginx.conf now exposes that endpoint explicitly so
# we can keep the chart defaults.
#
# Runtime config for the React app is baked in at build time (VITE_* env
# vars passed to `docker build`); at pod runtime there are no secrets or
# env vars to bind, so `env` and `envFromSecret` stay empty.

nameOverride: frontend
fullnameOverride: frontend
image:
  repository: ghcr.io/bmogetta/recess-frontend
  tag: v0.2.0-alpha.1
service:
  httpPort: 3000
env: {}
envFromSecret: {}
# Nginx doesn't emit OTLP — skip the chart's default endpoint injection.
observability:
  otlpEndpoint: ""
# nginx:alpine runs as uid 101, not 1001 like the Go services. Override
# the chart defaults so kubelet's runAsNonRoot check passes.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  # Nginx needs writable /var/cache/nginx, /var/run, /run (it writes a PID
  # file and cache content). Moving those to emptyDir volumes is possible
  # but invasive; leave rootfs writable until the homelab enforces strict
  # PSS. Tracked as a follow-up to task #21.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  capabilities:
    drop:
      - ALL
# Nginx serves from its own writable rootfs; no /tmp emptyDir needed.
tmpEmptyDir:
  enabled: false
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 96Mi
probes:
  # Nginx boots in under a second; both probes converge quickly.
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /healthz
    initialDelaySeconds: 2
    periodSeconds: 5

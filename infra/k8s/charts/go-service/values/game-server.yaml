# game-server overrides for the go-service chart.
# Largest service: HTTP (8080) + gRPC (9080) + Asynq client/server for
# turn timers + Redis pub/sub + Postgres (default schema owner).

nameOverride: game-server
fullnameOverride: game-server
image:
  repository: ghcr.io/bmogetta/recess-game-server
  tag: v0.2.0-alpha.1
service:
  httpPort: 8080
  grpcPort: 9080
env:
  ENV: production
  OTEL_SERVICE_NAME: game-server
  USER_SERVICE_ADDR: user-service:9082
envFromSecret:
  JWT_SECRET:
    secretName: jwt
    key: JWT_SECRET
  DATABASE_URL:
    secretName: db-auth
    key: DATABASE_URL
  REDIS_URL:
    secretName: redis-url
    key: REDIS_URL
resources:
  # Bigger surface area (runtime + lobby + reaper + asynq) than the other
  # services; bump memory headroom accordingly.
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 384Mi
metrics:
  enabled: true
  path: /metrics

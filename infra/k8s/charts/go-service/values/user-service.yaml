# user-service overrides for the go-service chart.
# Exposes gRPC on :9082 (consumed by chat-service, ws-gateway,
# notification-service).

nameOverride: user-service
fullnameOverride: user-service

image:
  repository: ghcr.io/bmogetta/recess-user-service
  tag: latest

service:
  httpPort: 8082
  grpcPort: 9082

env:
  ENV: production
  OTEL_SERVICE_NAME: user-service

envFromSecret:
  JWT_SECRET:
    secretName: jwt
    key: JWT_SECRET
  DATABASE_URL:
    secretName: db-auth
    key: DATABASE_URL
  REDIS_URL:
    secretName: redis-url
    key: REDIS_URL

resources:
  requests:
    cpu: 25m
    memory: 96Mi
  limits:
    cpu: 500m
    memory: 256Mi

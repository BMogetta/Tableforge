# ws-gateway overrides for the go-service chart.
# No DATABASE_URL (gateway only talks to Redis + user-service gRPC +
# game-server gRPC). JWT_SECRET for verifying tokens on the WS upgrade.

nameOverride: ws-gateway
fullnameOverride: ws-gateway
image:
  repository: ghcr.io/bmogetta/recess-ws-gateway
  tag: v0.2.0-alpha.1
service:
  httpPort: 8084
env:
  ENV: production
  OTEL_SERVICE_NAME: ws-gateway
  # Default gRPC endpoints resolve to other services in the same namespace
  # via their Kubernetes Service names. These match the defaults in main.go
  # but setting them explicitly documents the dependency graph.
  USER_SERVICE_ADDR: user-service:9082
  GAME_SERVER_ADDR: game-server:9080
envFromSecret:
  JWT_SECRET:
    secretName: jwt
    key: JWT_SECRET
  REDIS_URL:
    secretName: redis-url
    key: REDIS_URL
resources:
  requests:
    cpu: 25m
    memory: 96Mi
  limits:
    cpu: 500m
    memory: 256Mi
probes:
  # WebSocket upgrade path can be slow; bump liveness to avoid killing
  # during legitimate backpressure.
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
metrics:
  enabled: true
  path: /metrics

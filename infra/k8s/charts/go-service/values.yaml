# Defaults for the go-service chart. Per-service overrides live in
# infra/k8s/charts/go-service/values/<service>.yaml and are referenced from
# each service's ArgoCD Application CR.

nameOverride: ""
fullnameOverride: ""

image:
  repository: ""
  tag: latest
  # `:latest` tag + `IfNotPresent` hides new images: kubelet sees the tag
  # cached locally and skips the pull even after CD pushes a fresh digest.
  # For the canary phase the safe default is `Always` — small images (~25MB),
  # rare restarts, and we always want the newest build. Follow-up task #12:
  # once CD bumps values/<svc>.yaml to an immutable `tag: sha-<commit>` per
  # build, flip this back to `IfNotPresent` — pulls happen on tag change only.
  pullPolicy: Always

# OTLP endpoint auto-injected as OTEL_EXPORTER_OTLP_ENDPOINT. Set to empty
# string (or null) in a service's values file to skip injection — useful
# for the frontend which doesn't emit OTel signals.
observability:
  otlpEndpoint: otel-collector.observability.svc.cluster.local:4317

replicaCount: 1

service:
  type: ClusterIP
  httpPort: 8080
  # 0 disables the gRPC port (+ Service port). Set to e.g. 9080 for game-server.
  grpcPort: 0

# Plain literal env vars. Keys are env names; values are strings.
# Example:
#   env:
#     ENV: production
#     OTEL_SERVICE_NAME: auth-service
env: {}

# Env vars sourced from Secrets in the same namespace.
# Key = env var name; value = { secretName, key }.
# Example:
#   envFromSecret:
#     DATABASE_URL:
#       secretName: db-auth
#       key: DATABASE_URL
envFromSecret: {}

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 5

serviceAccount:
  create: true
  name: ""

# Security context — hardens every service by default so Polaris passes the
# "dangerous capabilities" / "privilege escalation" / "runAsNonRoot" checks
# without per-service boilerplate. Each service's Dockerfile already sets
# `USER appuser` (uid 1001) or `USER nginx`, so we don't force a uid here
# — just enforce non-root and drop capabilities.
#
# readOnlyRootFilesystem is default false because Nginx (frontend) needs
# writable /var/cache/nginx and /var/run, and flipping it on per Go service
# requires confirming nothing writes outside its own dirs. Flip on per
# service in values/<svc>.yaml when ready.
podSecurityContext:
  runAsNonRoot: true
  # UID matches `adduser -D -u 1001 appuser` in every services/*/Dockerfile.
  # Kubelet's runAsNonRoot check requires a numeric UID at admission time —
  # a USER-by-name directive produces "image has non-numeric user, cannot
  # verify user is non-root" and CreateContainerConfigError. Frontend
  # overrides to 101 (nginx).
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  # Root filesystem is read-only by default. Writable /tmp is provided
  # via the `tmpEmptyDir` volume below so Go stdlib temp files still work.
  # Frontend (nginx) must override this to false in its values file because
  # nginx needs writable /var/cache/nginx, /var/run, and /tmp.
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  capabilities:
    drop:
      - ALL

# Volume mounts that the template always emits when the rootfs is
# read-only. Keeps /tmp writable for Go stdlib ioutil.TempFile and
# similar — our services don't use it much but any dependency might.
tmpEmptyDir:
  enabled: true
  sizeLimit: 128Mi

# PodDisruptionBudget rendered only when replicaCount >= 2 (single-replica
# Deployments can't have a PDB with minAvailable: 1 — it would prevent any
# voluntary eviction and break node drains).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Priority class — defined in infra/k8s/priorityclasses.yaml. Fixes
# Polaris' `priorityClassNotSet` check (A.2 follow-up).
priorityClassName: recess-default

# Topology spread — meaningless on a single-node k3s cluster (all pods
# land on the same node regardless), but makes Polaris' check pass and
# future-proofs for multi-node. `ScheduleAnyway` so single-node doesn't
# end up with Pending pods.
topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

# --- Feature gates (off by default) ------------------------------------------

# Traefik IngressRoute. Flip on in Phase 5.8 when cloudflared lands.
ingress:
  enabled: false
  host: ""
  entryPoint: websecure
  tlsSecretName: ""

# Prometheus ServiceMonitor. Flip on in Phase 6 when kube-prometheus-stack lands.
metrics:
  enabled: false
  port: 9090
  path: /metrics

# HPA. Flip on after Phase 6 metrics are wired.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

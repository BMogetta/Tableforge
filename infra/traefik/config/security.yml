# Security headers middleware — applied to all public-facing routers.
# Traefik watches this file for changes (no restart needed).
#
# CSP notes:
#   - 'unsafe-inline' in style-src: required by CSS Modules runtime injection
#   - avatars.githubusercontent.com: GitHub profile images
#   - ws:/wss: WebSocket connections to ws-gateway
#   - /otlp: browser-side OpenTelemetry trace export
#   - blob: used by audio/SFX playback
#   - unleash.localhost: feature flag SDK fetches (/api/frontend)

http:
  middlewares:
    security-headers:
      headers:
        # -- Standard security headers --
        contentTypeNosniff: true
        browserXssFilter: true
        frameDeny: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"

        # -- Custom response headers --
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
          Strict-Transport-Security: "max-age=63072000; includeSubDomains; preload"

        # -- Content Security Policy --
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self' 'unsafe-inline';
          style-src 'self' 'unsafe-inline';
          font-src 'self';
          img-src 'self' data: https://avatars.githubusercontent.com;
          connect-src 'self' ws: wss: http://unleash.localhost https://l4kdz58q3w.ufs.sh;
          media-src 'self' blob: https://l4kdz58q3w.ufs.sh;
          frame-ancestors 'none'

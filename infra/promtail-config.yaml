server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["tableforge_caddy"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Tag all Caddy logs with a fixed label for easy filtering in Grafana
      - target_label: job
        replacement: caddy
    pipeline_stages:
      # Caddy logs are JSON — parse them directly
      - json:
          expressions:
            level: level
            status: status
            method: request.method
            path: request.uri
            latency: duration
            remote_ip: request.remote_ip
      - labels:
          level:
          status:
          method:
      # Drop health check noise
      - drop:
          expression: '.*GET /health.*'
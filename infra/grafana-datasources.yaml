apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        filterBySpanID: false

  # Read-only analytics queries — used by the bot_analytics dashboard.
  # Uses the claude_mcp_ro role (purpose-built RO user; password is read
  # from GRAFANA_DB_PASSWORD in the env so the yaml stays secret-free).
  - name: Postgres
    type: postgres
    uid: postgres
    access: proxy
    url: postgres:5432
    database: recess
    user: claude_mcp_ro
    secureJsonData:
      password: $GRAFANA_DB_PASSWORD
    jsonData:
      sslmode: disable
      postgresVersion: 1600
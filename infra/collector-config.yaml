receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # memory_limiter MUST be first — prevents OOM before batch accumulates data
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

  batch:
    timeout: 5s
    send_batch_size: 512

  # Adds service metadata to every span/metric/log.
  # Useful for filtering in Grafana when multiple services emit to the same collector.
  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert

exporters:
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Prometheus scrapes this endpoint (see prometheus.yaml job: otel-collector)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel
    # Adds service_name label to every metric so you can filter per service
    # in Grafana without needing separate jobs per service at this stage.
    resource_to_telemetry_conversion:
      enabled: true
service:
  telemetry:
    logs:
      level: warn
      output_paths: ["stdout"]
      error_output_paths: ["stderr"]
    metrics:
      level: basic
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp_grpc/tempo]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp_http/loki]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus]
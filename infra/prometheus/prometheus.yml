global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "game-server"
    static_configs:
      - targets: ["game-server:8080"]
    metrics_path: /metrics

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml
include:
  - docker-compose.monitoring.yml

name: tableforge
services:
  # ── Application ────────────────────────────────────────────────────────────
  game-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: 'game-server'
    networks:
      - app_network
      - data_network
    environment:
      - DATABASE_URL=postgres://tableforge:tableforge@postgres:5432/tableforge?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=game-server
      - ENV=development
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost
      - TEST_MODE=${TEST_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
      - VITE_TEST_MODE=${TEST_MODE:-false}
    container_name: 'frontend'
    networks:
      - app_network
    depends_on:
      - game-server
    restart: unless-stopped

  seeder:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: 'seeder'
    networks:
      - app_network
      - data_network
    entrypoint: ["/bin/seeder"]
    environment:
      - DATABASE_URL=postgres://tableforge:tableforge@postgres:5432/tableforge?sslmode=disable
      - OWNER_EMAIL=${OWNER_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  caddy:
    image: caddy:2-alpine
    container_name: 'caddy'
    networks:
      - app_network
    ports:
      - "80:80"
      - "443:443"
    environment:
      - GRAFANA_BASICAUTH_HASH=${GRAFANA_BASICAUTH_HASH}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - game-server
      - frontend
    restart: unless-stopped

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: 'postgres'
    environment:
      POSTGRES_USER: tableforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tableforge
    networks:
      - data_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tableforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: 'redis'
    command: redis-server --notify-keyspace-events Ex
    networks:
      - data_network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # alertmanager:
  #   image: prom/alertmanager
  #   volumes:
  #     - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml

volumes:
  postgres_data:
  redis_data:
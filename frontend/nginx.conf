server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Kubernetes liveness/readiness probe target. Kept cheap and outside the
    # access log so the noise from kubelet hitting it every few seconds
    # doesn't drown the real request log.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Hashed assets — Vite emits these with content hashes in the filename,
    # so the contents are immutable for a given URL and can be cached long-term.
    # When the bundle changes, Vite emits a new filename and the old cache entry
    # becomes irrelevant.
    location /assets/ {
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # index.html — always revalidate so clients pick up new asset hashes on
    # the first request after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback — Traefik handles /api, /auth, /ws routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

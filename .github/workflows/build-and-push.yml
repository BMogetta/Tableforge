name: Build and Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/recess-server
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/recess-frontend

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ARM64 support for Raspberry Pi 5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Build server image for linux/arm64 (Pi 5)
      - name: Build and push server
        id: build-server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/arm64
          push: true
          tags: ${{ env.SERVER_IMAGE }}:latest
          # Cache layers in GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign server image
        run: cosign sign --yes ${{ env.SERVER_IMAGE }}@${{ steps.build-server.outputs.digest }}

      # Build frontend image for linux/arm64
      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign frontend image
        run: cosign sign --yes ${{ env.FRONTEND_IMAGE }}@${{ steps.build-frontend.outputs.digest }}
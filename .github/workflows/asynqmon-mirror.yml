name: Asynqmon ARM64 mirror

# hibiken/asynqmon publishes amd64-only Docker images. The Pi 5 cluster
# is arm64, so the upstream image fails to pull. This workflow rebuilds
# upstream's source for arm64 and pushes the resulting image to GHCR
# (ghcr.io/<owner>/recess-asynqmon). recess-deploy points its asynqmon
# Deployment at our mirror image, with a comment noting the source.
#
# Trigger model:
#   - manual (workflow_dispatch) with a version input — pin to a specific
#     hibiken/asynqmon tag (e.g. 0.7.2).
#   - monthly cron — re-build the same pinned version against current
#     base images so we pick up base-OS security fixes without waiting
#     for upstream to re-tag.
#
# Bumping the asynqmon version: edit ASYNQMON_VERSION below, run
# workflow_dispatch with the new value, then update the image tag in
# recess-deploy/infra/k8s/asynqmon/deployment.yaml.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'hibiken/asynqmon git tag to mirror (e.g. v0.7.2)'
        required: true
        default: 'v0.7.2'
  schedule:
    # First of every month at 04:00 UTC. Stays in cache for the rest of
    # the month; no per-day churn.
    - cron: '0 4 1 * *'

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  # Default version when triggered by cron — keep in sync with
  # recess-deploy/infra/k8s/asynqmon/deployment.yaml.
  DEFAULT_VERSION: v0.7.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${DEFAULT_VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Strip the leading "v" for the image tag (deployment uses 0.7.2,
          # the upstream tag is v0.7.2). Both tags get pushed.
          echo "tag=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout hibiken/asynqmon
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: hibiken/asynqmon
          ref: ${{ steps.version.outputs.version }}

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3.9.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build and push (arm64)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.9.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-asynqmon:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-asynqmon:latest

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3.9.2

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-asynqmon@${DIGEST}

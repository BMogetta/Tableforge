name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'run-e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create .env for CI
        run: |
          cp .env.example .env
          echo "TEST_MODE=true" >> .env
          echo "POSTGRES_PASSWORD=recess" >> .env
          echo "JWT_SECRET=ci-test-secret-do-not-use-in-prod" >> .env

      - name: Start services
        run: make up-test
        timeout-minutes: 10

      - name: Wait for healthy
        run: |
          echo "Waiting for services..."
          timeout 120 bash -c '
            until docker compose ps --format json 2>/dev/null | \
              jq -e "[.[] | select(.Health != \"\" and .Health != \"healthy\")] | length == 0" > /dev/null 2>&1; do
              sleep 5
            done
          '
          echo "All healthy."

      - name: Seed test players
        run: make seed-test

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run tests
        working-directory: frontend
        run: npx playwright test --reporter=html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Docker logs on failure
        if: failure()
        run: docker compose logs --tail=200

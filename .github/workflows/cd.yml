name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.services.outputs.matrix }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            game-server:
              - 'services/game-server/**'
              - 'shared/**'
            auth-service:
              - 'services/auth-service/**'
              - 'shared/**'
            user-service:
              - 'services/user-service/**'
              - 'shared/**'
            chat-service:
              - 'services/chat-service/**'
              - 'shared/**'
            rating-service:
              - 'services/rating-service/**'
              - 'shared/**'
            match-service:
              - 'services/match-service/**'
              - 'shared/**'
            notification-service:
              - 'services/notification-service/**'
              - 'shared/**'
            ws-gateway:
              - 'services/ws-gateway/**'
              - 'shared/**'
            frontend:
              - 'frontend/**'
      - name: Build service matrix
        id: services
        run: |
          raw='${{ steps.filter.outputs.changes }}'
          matrix=$(echo "$raw" | jq -c '[.[] | select(. != "frontend")]')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-services:
    name: "Build: ${{ matrix.service }}"
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tableforge-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tableforge-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  build-frontend:
    name: "Build: frontend"
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tableforge-frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tableforge-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

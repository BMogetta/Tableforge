name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Manual rebuild escape hatch: useful for first-time bootstrap (before any
  # service code has changed), for re-publishing a tag after a GHCR delete,
  # or for forcing a rebuild when paths-filter would otherwise skip.
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        required: true
        default: auth-service
        type: choice
        options:
          - auth-service
          - chat-service
          - game-server
          - match-service
          - notification-service
          - rating-service
          - user-service
          - ws-gateway
          - frontend
          - all-services
          - all

concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    name: Detect changes
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.resolve.outputs.services }}
      frontend: ${{ steps.resolve.outputs.frontend }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      # Automatic path detection only fires on the workflow_run trigger.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: ${{ github.event_name == 'workflow_run' }}
        with:
          base: ${{ github.event.workflow_run.head_branch }}
          ref: ${{ github.event.workflow_run.head_sha }}
          filters: .github/paths-filters.yml
      # Single step that resolves (services, frontend, sha) regardless of
      # whether the trigger was workflow_run (paths-filter output) or
      # workflow_dispatch (inputs.target).
      - name: Resolve build targets
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            sha="${{ github.sha }}"
            target="${{ inputs.target }}"
            case "$target" in
              all|all-services)
                services='["auth-service","chat-service","game-server","match-service","notification-service","rating-service","user-service","ws-gateway"]'
                ;;
              frontend)
                services='[]'
                ;;
              *)
                services="[\"$target\"]"
                ;;
            esac
            case "$target" in
              frontend|all) frontend=true ;;
              *)            frontend=false ;;
            esac
          else
            sha="${{ github.event.workflow_run.head_sha }}"
            raw='${{ steps.filter.outputs.changes }}'
            services=$(echo "$raw" | jq -c '[.[] | select(. != "frontend" and . != "compose")]')
            frontend='${{ steps.filter.outputs.frontend }}'
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

  build-services:
    name: "Build: ${{ matrix.service }}"
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.changes.outputs.sha }}
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3.9.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # OCI image refs must be lowercase. github.repository_owner may contain
      # uppercase letters (e.g. "BMogetta"), so normalise it once per job.
      - name: Lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: Build scan image (arm64 only, for Trivy)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.9.0
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: recess-${{ matrix.service }}:scan
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: recess-${{ matrix.service }}:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.9.0
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-${{ matrix.service }}:${{ needs.changes.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3.9.2
      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-${{ matrix.service }}@${DIGEST}

  build-frontend:
    name: "Build: frontend"
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.changes.outputs.sha }}
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3.9.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # OCI image refs must be lowercase. See build-services job above for context.
      - name: Lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: Build scan image (arm64 only, for Trivy)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.9.0
        with:
          context: ./frontend
          platforms: linux/arm64
          push: false
          load: true
          tags: recess-frontend:scan
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: recess-frontend:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-frontend.sarif
      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.9.0
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-frontend:${{ needs.changes.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3.9.2
      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-frontend@${DIGEST}

name: Release (on tag)

on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Parse tag
        id: tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          component="${tag%%-v*}"
          version="${tag##*-v}"
          major_minor="${version%.*}"

          if [ "$component" = "frontend" ]; then
            context="./frontend"
            dockerfile="frontend/Dockerfile"
          else
            context="."
            dockerfile="services/${component}/Dockerfile"
          fi

          {
            echo "component=$component"
            echo "version=$version"
            echo "major_minor=$major_minor"
            echo "context=$context"
            echo "dockerfile=$dockerfile"
          } >> "$GITHUB_OUTPUT"

          echo "Parsed tag: component=$component version=$version major_minor=$major_minor"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: amd64,arm64
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.9.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build scan image (amd64 only, for Trivy)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.9.0
        with:
          context: ${{ steps.tag.outputs.context }}
          file: ${{ steps.tag.outputs.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: tableforge-${{ steps.tag.outputs.component }}:scan
          cache-from: type=gha,scope=${{ steps.tag.outputs.component }}
          cache-to: type=gha,mode=max,scope=${{ steps.tag.outputs.component }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: tableforge-${{ steps.tag.outputs.component }}:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-release.sarif

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          sarif_file: trivy-release.sarif
          category: trivy-release-${{ steps.tag.outputs.component }}

      - name: Build and push (multi-arch, release tags)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.9.0
        with:
          context: ${{ steps.tag.outputs.context }}
          file: ${{ steps.tag.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tableforge-${{ steps.tag.outputs.component }}:v${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tableforge-${{ steps.tag.outputs.component }}:v${{ steps.tag.outputs.major_minor }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tableforge-${{ steps.tag.outputs.component }}:latest
          cache-from: type=gha,scope=${{ steps.tag.outputs.component }}
          cache-to: type=gha,mode=max,scope=${{ steps.tag.outputs.component }}

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.2

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tableforge-${{ steps.tag.outputs.component }}@${DIGEST}

      - name: Checkout main for values bump
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          path: main-wt
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image.tag in infra/k8s and push
        working-directory: main-wt
        run: |
          set -euo pipefail
          values_file="infra/k8s/apps/${{ steps.tag.outputs.component }}/values.yaml"

          if [ ! -f "$values_file" ]; then
            echo "::warning title=Values bump skipped::${values_file} does not exist yet (Fase 5 not complete). No cluster sync to trigger."
            exit 0
          fi

          # yq is preinstalled on ubuntu-latest runners.
          yq -i '.image.tag = strenv(IMAGE_TAG)' "$values_file"

          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if git diff --quiet -- "$values_file"; then
            echo "values.yaml already at ${IMAGE_TAG} — nothing to commit"
            exit 0
          fi

          git add "$values_file"
          git commit -m "chore(${{ steps.tag.outputs.component }}): bump image.tag to ${IMAGE_TAG} [skip ci]"
          git push origin main
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.version }}

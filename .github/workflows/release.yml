name: Release (on tag)

on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Parse tag
        id: tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          component="${tag%%-v*}"
          version="${tag##*-v}"
          major_minor="${version%.*}"

          if [ "$component" = "frontend" ]; then
            context="./frontend"
            dockerfile="frontend/Dockerfile"
          else
            context="."
            dockerfile="services/${component}/Dockerfile"
          fi

          {
            echo "component=$component"
            echo "version=$version"
            echo "major_minor=$major_minor"
            echo "context=$context"
            echo "dockerfile=$dockerfile"
          } >> "$GITHUB_OUTPUT"

          echo "Parsed tag: component=$component version=$version major_minor=$major_minor"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3.9.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI image refs must be lowercase. github.repository_owner may contain
      # uppercase letters (e.g. "BMogetta"), so normalise it once per job.
      - name: Lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build scan image (arm64 only, for Trivy)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.9.0
        with:
          context: ${{ steps.tag.outputs.context }}
          file: ${{ steps.tag.outputs.dockerfile }}
          platforms: linux/arm64
          push: false
          load: true
          tags: recess-${{ steps.tag.outputs.component }}:scan
          cache-from: type=gha,scope=${{ steps.tag.outputs.component }}
          cache-to: type=gha,mode=max,scope=${{ steps.tag.outputs.component }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: recess-${{ steps.tag.outputs.component }}:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-release.sarif

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-release.sarif
          category: trivy-release-${{ steps.tag.outputs.component }}

      - name: Build and push (arm64, release tags)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.9.0
        with:
          context: ${{ steps.tag.outputs.context }}
          file: ${{ steps.tag.outputs.dockerfile }}
          platforms: linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-${{ steps.tag.outputs.component }}:v${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-${{ steps.tag.outputs.component }}:v${{ steps.tag.outputs.major_minor }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-${{ steps.tag.outputs.component }}:latest
          cache-from: type=gha,scope=${{ steps.tag.outputs.component }}
          cache-to: type=gha,mode=max,scope=${{ steps.tag.outputs.component }}

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3.9.2

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/recess-${{ steps.tag.outputs.component }}@${DIGEST}

      - name: Mint deploy repo token
        id: deploy-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: recess-deploy

      - name: Checkout recess-deploy
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/recess-deploy
          ref: main
          path: deploy-wt
          token: ${{ steps.deploy-token.outputs.token }}

      - name: Bump image.tag in recess-deploy
        working-directory: deploy-wt
        env:
          IMAGE_TAG: v${{ steps.tag.outputs.version }}
          COMPONENT: ${{ steps.tag.outputs.component }}
          APP_SLUG: ${{ steps.deploy-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          values_file="infra/k8s/charts/go-service/values/${COMPONENT}.yaml"

          if [ ! -f "$values_file" ]; then
            echo "::warning title=Values bump skipped::${values_file} does not exist in recess-deploy."
            exit 0
          fi

          yq -i '.image.tag = strenv(IMAGE_TAG)' "$values_file"

          if git diff --quiet -- "$values_file"; then
            echo "values.yaml already at ${IMAGE_TAG} — nothing to commit"
            exit 0
          fi

          bot_id=$(curl -sS "https://api.github.com/users/${APP_SLUG}%5Bbot%5D" | jq -r .id)
          git config user.name  "${APP_SLUG}[bot]"
          git config user.email "${bot_id}+${APP_SLUG}[bot]@users.noreply.github.com"

          git add "$values_file"
          git commit -m "chore(${COMPONENT}): bump image.tag to ${IMAGE_TAG} [skip ci]"
          git push origin main

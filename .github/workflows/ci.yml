name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # Skip CI on release-please merges — the only files that change are
    # CHANGELOGs and version manifests, none of which any unit test or
    # lint exercises. Saves ~3-5 min of GHA minutes per cut (× 9
    # components per release wave). Image.tag bumps go to recess-deploy,
    # not this repo, so no path filter is needed for them.
    paths-ignore:
      - '**/CHANGELOG.md'
      - '.release-please-manifest.json'
      - 'release-please-config.json'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go-services: ${{ steps.go-services.outputs.matrix }}
      frontend: ${{ steps.filter.outputs.frontend }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: .github/paths-filters.yml

      - name: Build Go service matrix
        id: go-services
        run: |
          raw='${{ steps.filter.outputs.changes }}'
          matrix=$(echo "$raw" | jq -c '[.[] | select(. != "frontend" and . != "compose")]')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  go-lint:
    name: "Lint: ${{ matrix.service }}"
    needs: changes
    if: ${{ needs.changes.outputs.go-services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.go-services) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          working-directory: services/${{ matrix.service }}

  go-test:
    name: "Test: ${{ matrix.service }}"
    needs: changes
    if: ${{ needs.changes.outputs.go-services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.go-services) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache: true
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./services/${{ matrix.service }}/...
      - name: Upload coverage (artifact)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.service }}
          path: coverage.out
          retention-days: 7
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.out
          flags: ${{ matrix.service }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend-ci:
    name: Frontend
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: npm audit (production deps, high+)
        run: npm audit --audit-level=high --omit=dev
      - name: Biome lint
        run: npx @biomejs/biome lint ./src
      - name: Biome check (formatting + lint + import sort)
        run: npx @biomejs/biome check ./src
      - name: Production build (tsc + vite)
        run: npm run build
      - name: Vitest
        run: npx vitest run
      - name: i18n key coverage
        continue-on-error: true
        run: node ../scripts/check-i18n.mjs --warn
      - name: Upload production bundle
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-bundle
          path: frontend/dist
          retention-days: 3

  go-vuln:
    name: "Go: govulncheck"
    needs: changes
    if: ${{ needs.changes.outputs.go-services != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0
      - name: Run govulncheck across service modules
        env:
          # govulncheck v1.2 chokes on go.work when run per-module —
          # force module mode so each module is resolved independently.
          GOWORK: "off"
        run: |
          set -e
          # `shared/` is skipped: testcontainers-go pulls old docker/containerd
          # transitives that govulncheck flags, but those paths are only
          # reachable from integration tests, not from service runtime.
          # TODO(p3): bundle testcontainers upgrade with genproto/grpc
          # bump so shared/ clears the scan.
          for mod in $(find ./services ./tools -name go.mod -exec dirname {} \;); do
            echo "=== $mod ==="
            (cd "$mod" && govulncheck ./...)
          done

  schema-drift:
    name: Schema Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache: true
      - name: Install protoc
        run: |
          # apt-get gives you whatever the base image ships (3.21.12 on
          # ubuntu-24.04 today) and the version leaks into the `// protoc vX.Y.Z`
          # header of every generated .pb.go. Pin it so the file contents
          # match what devs produce locally — otherwise every CI run reports
          # Schema Drift on the comment.
          PROTOC_VERSION=3.12.4
          curl -sSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -o -d /usr/local /tmp/protoc.zip 'bin/*' 'include/*'
          # The zip stores the binary without the +x bit; restore it.
          sudo chmod +x /usr/local/bin/protoc
          protoc --version
      - name: Install protoc-gen-go + protoc-gen-go-grpc
        run: |
          # Keep these in sync with the versions developers install locally
          # (see make setup). Mismatches here produce Schema Drift CI fails
          # that look like phantom changes but are just different codegen.
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
      - name: Install frontend deps (for gen-types)
        working-directory: frontend
        run: npm ci
      - name: Regenerate Zod types from JSON Schemas
        run: make gen-types
      - name: Regenerate protobuf Go stubs
        run: make gen-proto
      - name: Fail if generated files drifted
        run: git diff --exit-code frontend/src/lib/schema-generated.zod.ts shared/proto/

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-validate:
    name: "Validate Compose: ${{ matrix.profile.name }}"
    needs: changes
    if: ${{ needs.changes.outputs.compose == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: base
            cmd: docker compose config --quiet
          - name: app
            cmd: docker compose --profile app config --quiet
          - name: monitoring
            cmd: docker compose --profile app --profile monitoring config --quiet
          - name: production
            cmd: docker compose -f docker-compose.yml -f docker-compose.services.yml -f docker-compose.monitoring.yml --profile production --profile app --profile monitoring config --quiet
          - name: test
            cmd: docker compose -f docker-compose.yml --profile app config --quiet
    env:
      CLOUDFLARE_TUNNEL_TOKEN: stub-for-validation
      TEST_MODE: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ${{ matrix.profile.name }}
        run: ${{ matrix.profile.cmd }}

  ci-success:
    name: CI Success
    needs: [changes, go-lint, go-test, go-vuln, frontend-ci, schema-drift, gitleaks, compose-validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no upstream jobs failed or were cancelled
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$RESULTS" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")'

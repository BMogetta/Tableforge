name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go-services: ${{ steps.go-services.outputs.matrix }}
      frontend: ${{ steps.filter.outputs.frontend }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: .github/paths-filters.yml

      - name: Build Go service matrix
        id: go-services
        run: |
          raw='${{ steps.filter.outputs.changes }}'
          matrix=$(echo "$raw" | jq -c '[.[] | select(. != "frontend" and . != "compose")]')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  go-lint:
    name: "Lint: ${{ matrix.service }}"
    needs: changes
    if: ${{ needs.changes.outputs.go-services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.go-services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.work
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v2.11.4
          working-directory: services/${{ matrix.service }}

  go-test:
    name: "Test: ${{ matrix.service }}"
    needs: changes
    if: ${{ needs.changes.outputs.go-services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.go-services) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.work
          cache: true
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./services/${{ matrix.service }}/...
      - name: Upload coverage (artifact)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.service }}
          path: coverage.out
          retention-days: 7
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.out
          flags: ${{ matrix.service }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend-ci:
    name: Frontend
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: npm audit (production deps, high+)
        run: npm audit --audit-level=high --omit=dev
      - name: Biome lint
        run: npx @biomejs/biome lint ./src
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Vitest
        run: npx vitest run
      - name: i18n key coverage
        continue-on-error: true
        run: node ../scripts/check-i18n.mjs --warn

  go-vuln:
    name: "Go: govulncheck"
    needs: changes
    if: ${{ needs.changes.outputs.go-services != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.work
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0
      - name: Run govulncheck
        run: govulncheck ./...

  schema-drift:
    name: Schema Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.work
          cache: true
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install protoc-gen-go + protoc-gen-go-grpc
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.35.2
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - name: Install frontend deps (for gen-types)
        working-directory: frontend
        run: npm ci
      - name: Regenerate Zod types from JSON Schemas
        run: make gen-types
      - name: Regenerate protobuf Go stubs
        run: make gen-proto
      - name: Fail if generated files drifted
        run: git diff --exit-code frontend/src/lib/schema-generated.zod.ts shared/proto/

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-validate:
    name: "Validate Compose: ${{ matrix.profile.name }}"
    needs: changes
    if: ${{ needs.changes.outputs.compose == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: base
            cmd: docker compose config --quiet
          - name: app
            cmd: docker compose --profile app config --quiet
          - name: monitoring
            cmd: docker compose --profile app --profile monitoring config --quiet
          - name: production
            cmd: docker compose -f docker-compose.yml -f docker-compose.services.yml -f docker-compose.monitoring.yml --profile production --profile app --profile monitoring config --quiet
          - name: test
            cmd: docker compose -f docker-compose.yml --profile app config --quiet
    env:
      CLOUDFLARE_TUNNEL_TOKEN: stub-for-validation
      TEST_MODE: 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: ${{ matrix.profile.name }}
        run: ${{ matrix.profile.cmd }}

  ci-success:
    name: CI Success
    needs: [changes, go-lint, go-test, go-vuln, frontend-ci, schema-drift, gitleaks, compose-validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no upstream jobs failed or were cancelled
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$RESULTS" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")'

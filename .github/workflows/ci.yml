name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go-services: ${{ steps.go-services.outputs.matrix }}
      frontend: ${{ steps.filter.outputs.frontend }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/paths-filters.yml

      - name: Build Go service matrix
        id: go-services
        run: |
          raw='${{ steps.filter.outputs.changes }}'
          matrix=$(echo "$raw" | jq -c '[.[] | select(. != "frontend" and . != "compose")]')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  go-lint:
    name: "Lint: ${{ matrix.service }}"
    needs: changes
    if: ${{ needs.changes.outputs.go-services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.go-services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
          working-directory: services/${{ matrix.service }}

  go-test:
    name: "Test: ${{ matrix.service }}"
    needs: changes
    if: ${{ needs.changes.outputs.go-services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.go-services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./services/${{ matrix.service }}/...
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: coverage.out
          retention-days: 7

  frontend-ci:
    name: Frontend
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: npm audit (production deps, high+)
        run: npm audit --audit-level=high --omit=dev
      - name: Biome lint
        run: npx @biomejs/biome lint ./src
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Vitest
        run: npx vitest run
      - name: i18n key coverage
        continue-on-error: true
        run: node ../scripts/check-i18n.mjs --warn

  go-vuln:
    name: "Go: govulncheck"
    needs: changes
    if: ${{ needs.changes.outputs.go-services != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0
      - name: Run govulncheck
        run: govulncheck ./...

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-validate:
    name: Validate Compose
    needs: changes
    if: ${{ needs.changes.outputs.compose == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose files
        run: docker compose config --quiet

  ci-success:
    name: CI Success
    needs: [changes, go-lint, go-test, go-vuln, frontend-ci, gitleaks, compose-validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no upstream jobs failed or were cancelled
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$RESULTS" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")'

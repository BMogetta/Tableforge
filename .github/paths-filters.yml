# Shared path filters for CI and CD workflows.
# Consumed by dorny/paths-filter via `filters: .github/paths-filters.yml`.
# See CI_CD_IMPROVEMENT_PLAN.md 1.4.a for the import audit that drives these groupings.
#
# Convention: each service lists its own dir plus every shared/ subtree it actually imports.
# Keep the lists flat (paths-filter does not flatten nested sequences) and in the same
# order as the audit in the plan to make drift obvious.
#
# Note on shared/db: only `migrations/**` is wired in. The migrator image (Dockerfile,
# entrypoint.sh, .dockerignore) and seeds/ are k8s-only artifacts that don't affect
# Go service runtime or testcontainers-based tests, so they're intentionally excluded
# from the per-service triggers.

game-server:
  - 'services/game-server/**'
  - 'shared/config/**'
  - 'shared/middleware/**'
  - 'shared/redis/**'
  - 'shared/telemetry/**'
  - 'shared/testutil/**'
  - 'shared/schemas/**'
  - 'shared/db/migrations/**'
  - 'shared/errors/**'
  - 'shared/go.mod'
  - 'shared/go.sum'
  - 'shared/events/**'
  - 'shared/ws/**'
  - 'shared/proto/game/**'
  - 'shared/proto/lobby/**'
  - 'shared/proto/user/**'
  - 'shared/domain/rating/**'
  - 'shared/domain/matchmaking/**'
  - 'shared/platform/**'


services:
  # ── Application ────────────────────────────────────────────────────────────
  game-server:
    image: ghcr.io/${GITHUB_OWNER}/tableforge-server:latest
    expose:
      - "8080"
    environment:
      - DATABASE_URL=postgres://tableforge:tableforge@postgres:5432/tableforge?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=game-server
      - ENV=production
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/tableforge-frontend:latest
    expose:
      - "3000"
    depends_on:
      - game-server
    restart: unless-stopped

  seeder:
    image: ghcr.io/${GITHUB_OWNER}/tableforge-server:latest
    # Override default entrypoint to run the seed binary instead of the server
    entrypoint: ["/bin/seeder"]
    environment:
      - DATABASE_URL=postgres://tableforge:tableforge@postgres:5432/tableforge?sslmode=disable
      - OWNER_EMAIL=${OWNER_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Reverse proxy ──────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - game-server
      - frontend
    restart: unless-stopped

  # ── Cloudflare Tunnel ──────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy
    restart: unless-stopped

  # ── Auto-updater ───────────────────────────────────────────────────────────
  # Polls GHCR every 5 minutes and restarts containers when a new image is pushed.
  # Only watches game-server and frontend — infrastructure containers are excluded.
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Docker credentials to pull from private GHCR registry
      - /root/.docker/config.json:/config.json
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
    command: game-server frontend
    restart: unless-stopped

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tableforge
      POSTGRES_PASSWORD: tableforge
      POSTGRES_DB: tableforge
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tableforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Telemetry ──────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/otel/config.yaml:/etc/otel/config.yaml
    expose:
      - "4317"
      - "4318"
    depends_on:
      - jaeger
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:2.4.0
    ports:
      - "127.0.0.1:16686:16686"
    expose:
      - "4317"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
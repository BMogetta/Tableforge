services:

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    networks:
      - app_network
      - data_network
    environment:
      - DATABASE_URL=postgres://recess:recess@postgres:5432/recess?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=auth-service
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      # Routes /auth/* to auth-service (includes /auth/me, /auth/github, etc.).
      # Priority 100 overrides game-server's priority 10 catchall.
      - "traefik.http.routers.auth-service.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth-service.entrypoints=web"
      - "traefik.http.routers.auth-service.priority=100"
      - "traefik.http.routers.auth-service.service=auth-service-svc"
      - "traefik.http.services.auth-service-svc.loadbalancer.server.port=8081"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    networks:
      - app_network
      - data_network
    environment:
      - DATABASE_URL=postgres://recess:recess@postgres:5432/recess?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=user-service
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_ADDR=:8082
      - GRPC_ADDR=:9082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      # Priority 50: higher than game-server (10), lower than auth-service (100).
      # Paths owned by user-service:
      #   /api/v1/players/{id}/profile
      #   /api/v1/players/{id}/friends (+ /friends/*)
      #   /api/v1/players/{id}/block/*
      #   /api/v1/players/{id}/mute (+ /mute/*, /mutes)
      #   /api/v1/players/{id}/achievements
      #   /api/v1/players/{id}/report
      #   /api/v1/admin/players/{id}/ban (+ /bans)
      #   /api/v1/admin/bans/*
      #   /api/v1/admin/reports (+ /reports/*)
      - "traefik.http.routers.user-service.rule=PathRegexp(`^/api/v1/players/search`) || PathRegexp(`^/api/v1/players/[^/]+/(profile|friends|block|mute|mutes|achievements|report|settings)`) || PathRegexp(`^/api/v1/admin/(players|allowed-emails|bans|reports)`)"
      - "traefik.http.routers.user-service.entrypoints=web"
      - "traefik.http.routers.user-service.priority=50"
      - "traefik.http.routers.user-service.service=user-service-svc"
      - "traefik.http.services.user-service-svc.loadbalancer.server.port=8082"
      # gRPC (internal only — not exposed via Traefik):
      #   game-server and ws-gateway reach user-service directly via Docker network
      #   at user-service:9082.

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    container_name: chat-service
    networks:
      - app_network
      - data_network
    environment:
      - DATABASE_URL=postgres://recess:recess@postgres:5432/recess?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=chat-service
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_ADDR=:8083
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      # Priority 50 — same tier as user-service, higher than game-server catchall (10).
      # Owns all chat and DM endpoints.
      - "traefik.http.routers.chat-service.rule=PathPrefix(`/api/v1/rooms`) && PathRegexp(`messages`) || PathRegexp(`^/api/v1/players/[^/]+/dm`) || PathPrefix(`/api/v1/dm`)"
      - "traefik.http.routers.chat-service.entrypoints=web"
      - "traefik.http.routers.chat-service.priority=50"
      - "traefik.http.routers.chat-service.service=chat-service-svc"
      - "traefik.http.services.chat-service-svc.loadbalancer.server.port=8083"

  ws-gateway:
    build:
      context: .
      dockerfile: services/ws-gateway/Dockerfile
    container_name: ws-gateway
    networks:
      - app_network
      - data_network
    environment:
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=ws-gateway
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_ADDR=user-service:9082
      - GAME_SERVER_ADDR=game-server:9080
      - HTTP_ADDR=:8084
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      game-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      # Priority 150 — highest priority, owns all /ws/* routes.
      # WebSocket connections need sticky sessions for multi-instance deployments.
      - "traefik.http.routers.ws-gateway.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.ws-gateway.entrypoints=web"
      - "traefik.http.routers.ws-gateway.priority=150"
      - "traefik.http.routers.ws-gateway.service=ws-gateway-svc"
      - "traefik.http.services.ws-gateway-svc.loadbalancer.server.port=8084"
      - "traefik.http.services.ws-gateway-svc.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.ws-gateway-svc.loadbalancer.sticky.cookie.name=ws_srv"
      # Presence REST endpoint — lower priority than WS routes.
      - "traefik.http.routers.ws-gateway-presence.rule=PathPrefix(`/api/v1/presence`)"
      - "traefik.http.routers.ws-gateway-presence.entrypoints=web"
      - "traefik.http.routers.ws-gateway-presence.priority=50"
      - "traefik.http.routers.ws-gateway-presence.service=ws-gateway-svc"

  rating-service:
    build:
      context: .
      dockerfile: services/rating-service/Dockerfile
    container_name: rating-service
    networks:
      - app_network
      - data_network
    environment:
      - DATABASE_URL=postgres://recess:recess@postgres:5432/recess?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=rating-service
      - HTTP_ADDR=:8085
      - GRPC_ADDR=:9085
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      # Priority 50 — same tier as user-service and chat-service.
      # Owns:
      #   GET /api/v1/ratings/{game_id}/leaderboard
      #   GET /api/v1/players/{id}/ratings/{game_id}
      - "traefik.http.routers.rating-service.rule=PathRegexp(`^/api/v1/ratings/`) || PathRegexp(`^/api/v1/players/[^/]+/ratings/`)"
      - "traefik.http.routers.rating-service.entrypoints=web"
      - "traefik.http.routers.rating-service.priority=50"
      - "traefik.http.routers.rating-service.service=rating-svc"
      - "traefik.http.services.rating-svc.loadbalancer.server.port=8085"
      # gRPC (internal only — not exposed via Traefik):
      #   game-server reaches rating-service directly at rating-service:9085.

  match-service:
    build:
      context: .
      dockerfile: services/match-service/Dockerfile
    container_name: match-service
    networks:
      - app_network
      - data_network
    environment:
      - REDIS_URL=redis://redis:6379
      - RATING_SERVICE_ADDR=rating-service:9085
      - GAME_SERVER_ADDR=game-server:9080
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=match-service
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_ADDR=:8087
    depends_on:
      redis:
        condition: service_healthy
      rating-service:
        condition: service_healthy
      game-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      # Priority 50 — same tier as user-service, chat-service, rating-service.
      # Owns all ranked matchmaking queue endpoints.
      - "traefik.http.routers.match-service.rule=PathPrefix(`/api/v1/queue`)"
      - "traefik.http.routers.match-service.entrypoints=web"
      - "traefik.http.routers.match-service.priority=50"
      - "traefik.http.routers.match-service.service=match-svc"
      - "traefik.http.services.match-svc.loadbalancer.server.port=8087"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    networks:
      - app_network
      - data_network
    environment:
      - DATABASE_URL=postgres://recess:recess@postgres:5432/recess?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=notification-service
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_ADDR=:8086
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      # Priority 50 — same tier as user-service and chat-service.
      # Owns:
      #   GET  /api/v1/players/{id}/notifications
      #   POST /api/v1/notifications/{id}/read
      #   POST /api/v1/notifications/{id}/accept
      #   POST /api/v1/notifications/{id}/decline
      # /internal/* is NOT exposed via Traefik — internal network only.
      - "traefik.http.routers.notification-service.rule=PathRegexp(`^/api/v1/players/[^/]+/notifications`) || PathRegexp(`^/api/v1/notifications/`)"
      - "traefik.http.routers.notification-service.entrypoints=web"
      - "traefik.http.routers.notification-service.priority=50"
      - "traefik.http.routers.notification-service.service=notification-svc"
      - "traefik.http.services.notification-svc.loadbalancer.server.port=8086"

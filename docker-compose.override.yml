services:
  traefik:
    ports:
      - "9090:8080"  # Traefik dashboard (dev only)

  game-server:
    environment:
      # Always-on in dev so the ScenarioPicker / debug load-state routes
      # register without needing to remember the env var. Excluded from prod
      # automatically because make up-prod uses -f and skips this override.
      - ALLOW_DEBUG_SCENARIOS=true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_TEST_MODE=${TEST_MODE:-false}

  grafana:
    environment:
      - GF_SERVER_ROOT_URL=http://grafana.localhost/
      # Open access as Admin for local development convenience.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    labels:
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
// shared/proto/game/v1/game.proto
//
// GameService — owned by game-service.
// Used by: match-service (start session after both players accept match)
//          replay-service (fetch move log for a finished session)
//          ws-gateway (TODO: IsParticipant once game-service is extracted)
//
// Note: real-time game actions (moves, pause, ready) go through the
// WebSocket → game-service directly, NOT through gRPC. gRPC here is
// only for control-plane operations initiated by other services.

syntax = "proto3";
package game.v1;
option go_package = "github.com/tableforge/shared/proto/game/v1;gamev1";

service GameService {
  // StartSession is called by match-service after both players accept.
  // Creates the game_session row and starts the ready-handshake timer.
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);

  // GetMoveLog is called by replay-service to fetch the ordered move list.
  rpc GetMoveLog(GetMoveLogRequest) returns (GetMoveLogResponse);

  // IsParticipant is called by ws-gateway before upgrading a room WebSocket
  // connection to determine participant vs spectator status without reading
  // Postgres directly.
  rpc IsParticipant(IsParticipantRequest) returns (IsParticipantResponse);
}

message StartSessionRequest {
  string room_id  = 1; // UUID — room must exist and be in 'waiting' status
  string game_id  = 2;
  string mode     = 3; // "casual" | "ranked"
}

message StartSessionResponse {
  string session_id = 1; // UUID of the created game_session
}

message GetMoveLogRequest {
  string session_id = 1;
}

message Move {
  int32  move_number = 1;
  string player_id   = 2;
  string payload     = 3; // JSON-encoded engine.Move.Payload
  string applied_at  = 4; // RFC3339
}

message GetMoveLogResponse {
  string         session_id = 1;
  string         game_id    = 2;
  repeated Move  moves      = 3;
}

message IsParticipantRequest {
  string room_id   = 1; // UUID
  string player_id = 2; // UUID
}

message IsParticipantResponse {
  bool is_participant     = 1; // true if player is seated in the room
  bool spectators_allowed = 2; // value of room_settings.allow_spectators
}
